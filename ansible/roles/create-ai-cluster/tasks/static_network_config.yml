---
# Separate tasks to populate static network configuration

- name: SNO - RH Lab Populate static network configuration
  set_fact:
    item_network_config:
    - network_yaml: "{{ lookup('template', 'sno_nmstate.yml.j2') }}"
      mac_interface_map: "{{ lookup('template', 'sno_mac_interface_map.json.j2')  }}"
  when:
  - cluster_type == "sno"
  - lab in rh_labs
  - not sno_use_lab_dhcp

- name: SNO - Cloud Lab Populate static network configuration
  set_fact:
    item_network_config:
    - network_yaml: "{{ lookup('template', 'ibmcloud_sno_nmstate.yml.j2') }}"
      mac_interface_map: "{{ lookup('template', 'ibmcloud_sno_mac_interface_map.json.j2')  }}"
  when:
  - cluster_type == "sno"
  - lab in cloud_labs

- name: MNO - RH Lab Populate static network configurationv
  set_fact:
    item_network_config:
      network_yaml: "{{ lookup('template', 'mno_nmstate.yml.j2') }}"
      mac_interface_map: "{{ lookup('template', 'mno_mac_interface_map.json.j2')  }}"
  when:
  - cluster_type == "mno"
  - lab in rh_labs or lab == "byol"

- name: MNO - Cloud Lab Populate static network configuration
  set_fact:
    item_network_config:
      network_yaml: "{{ lookup('template', 'ibmcloud_mno_nmstate.yml.j2') }}"
      mac_interface_map: "{{ lookup('template', 'ibmcloud_mno_mac_interface_map.json.j2')  }}"
  when:
  - cluster_type == "mno"
  - lab in cloud_labs

- name: Add {{ item }} ip config
  set_fact:
    static_network_config: "{{ static_network_config + [ item_network_config ] }}"
