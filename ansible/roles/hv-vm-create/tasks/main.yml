---
# hv-vm-create tasks
# Targets 'hv' hosts and batches all VM operations per hypervisor

- name: Build list of VMs on this hypervisor
  set_fact:
    _my_vms: >-
      {% set comma = joiner(",") -%}
      [{% for vm in groups['hv_vm'] | default([]) -%}
      {% if hostvars[vm]['ansible_host'] == inventory_hostname -%}
      {{ comma() }}"{{ vm }}"
      {%- endif -%}
      {%- endfor %}]

- name: Batch create VM disks
  shell: |
    pids=""
    {% for vm in _my_vms %}
    ( test -f "{{ hostvars[vm]['disk_location'] }}/{{ vm }}.qcow2" || \
      qemu-img create -f qcow2 "{{ hostvars[vm]['disk_location'] }}/{{ vm }}.qcow2" {{ hostvars[vm]['disk_size'] }}G ) &
    pids="$pids $!"
    {% if 'disk2_location' in hostvars[vm] %}
    ( test -f "{{ hostvars[vm]['disk2_location'] }}/{{ vm }}-sdb.qcow2" || \
      qemu-img create -f qcow2 "{{ hostvars[vm]['disk2_location'] }}/{{ vm }}-sdb.qcow2" {{ hostvars[vm]['disk2_size'] }}G ) &
    pids="$pids $!"
    {% endif %}
    {% if loop.index is divisibleby 10 %}
    for pid in $pids; do wait $pid || exit 1; done
    pids=""
    {% endif %}
    {% endfor %}
    for pid in $pids; do wait $pid || exit 1; done
  when: _my_vms | length > 0

- name: Configure VM hugepages
  when:
  - vm_hugepages
  - _my_vms | length > 0
  block:
    - name: Calculate total hugepages needed for all VMs on this hypervisor
      set_fact:
        _total_hugepages_needed: >-
          {{ _my_vms | map('extract', hostvars, 'memory') | map('int') | sum }}

    - name: Check host hugepages availability
      shell: |
        cat /sys/kernel/mm/hugepages/hugepages-1048576kB/free_hugepages
      register: _host_hugepages_free

    - name: Validate sufficient hugepages available
      fail:
        msg: >-
          Not enough 1048576kB hugepages available on host {{ inventory_hostname }}.
          Need: {{ _total_hugepages_needed }}, Available: {{ _host_hugepages_free.stdout }}
      when: (_host_hugepages_free.stdout | int) < (_total_hugepages_needed | int)

    - name: Display hugepages configuration
      debug:
        msg: >-
          {{ _my_vms | length }} VMs will use {{ _total_hugepages_needed }} 1Gi hugepages total
          ({{ _host_hugepages_free.stdout }} available on {{ inventory_hostname }})

- name: Gather host NUMA topology information
  shell: |
    lscpu | grep "NUMA node(s):" | awk '{print $3}'
  register: _host_numa_nodes
  when:
  - vnuma_enabled
  - _my_vms | length > 0

- name: Template out kvm definition files
  template:
    src: kvm-def.xml.j2
    dest: "{{ hv_kvm_def_path }}/{{ _current_vm }}.xml"
  loop: "{{ _my_vms }}"
  loop_control:
    loop_var: _current_vm

- name: Batch define VMs from XML
  shell: |
    pids=""
    {% for vm in _my_vms %}
    virsh define "{{ hv_kvm_def_path }}/{{ vm }}.xml" &
    pids="$pids $!"
    {% if loop.index is divisibleby 10 %}
    for pid in $pids; do wait $pid || exit 1; done
    pids=""
    {% endif %}
    {% endfor %}
    for pid in $pids; do wait $pid || exit 1; done
  when: _my_vms | length > 0

- name: Batch verify virtual BMC is accessible
  shell: |
    pids=""
    {% for vm in _my_vms %}
    (
    {% if hostvars[vm]['hv_ip'] | ansible.utils.ipv4 %}
      url="http://{{ hostvars[vm]['hv_ip'] }}:{{ hv_bmc_port }}/redfish/v1/Systems/{{ hostvars[vm]['domain_uuid'] }}"
    {% else %}
      url="http://[{{ hostvars[vm]['hv_ip'] }}]:{{ hv_bmc_port }}/redfish/v1/Systems/{{ hostvars[vm]['domain_uuid'] }}"
    {% endif %}
      for attempt in 1 2 3; do
        if curl -s -o /dev/null -w "%{http_code}" "$url" | grep -q "200"; then
          exit 0
        fi
        sleep 2
      done
      echo "FAILED: {{ vm }} at $url" >&2
      exit 1
    ) &
    pids="$pids $!"
    {% if loop.index is divisibleby 10 %}
    for pid in $pids; do wait $pid || exit 1; done
    pids=""
    {% endif %}
    {% endfor %}
    for pid in $pids; do wait $pid || exit 1; done
  when: _my_vms | length > 0
