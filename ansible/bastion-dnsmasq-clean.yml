---
# Removes dnsmasq configuration from the bastion host
#
# Example Usage:
#
# ansible-playbook -i ansible/inventory/cloud42.local ansible/bastion-dnsmasq-clean.yml
#

- name: Remove dnsmasq configuration from bastion
  hosts: bastion
  gather_facts: false
  vars_files:
  - vars/all.yml
  roles:
  - bastion-dnsmasq-clean
